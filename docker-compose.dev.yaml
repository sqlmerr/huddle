services:
  postgres:
    image: postgres:18.1-bookworm
    env_file:
      - ${PROJECT_ROOT}/backend/.env
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: always

  postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/backend/migrations:/migrations

volumes:
  postgres-data:
